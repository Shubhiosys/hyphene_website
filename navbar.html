<script>
// ── Navbar scroll state
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 16);
}, { passive: true });

// ── Mobile menu toggle - Fixed for clickability
let navToggle, mobileMenu, mobileMenuBackdrop, menuOpen = false;
let mobileMenuClose;

// Initialize mobile menu functionality
function initMobileMenu() {
  navToggle = document.getElementById('navToggle');
  mobileMenu = document.getElementById('mobileMenu');
  mobileMenuBackdrop = document.getElementById('mobileMenuBackdrop');
  mobileMenuClose = document.getElementById('mobileMenuClose');
  
  if (!navToggle || !mobileMenu || !mobileMenuBackdrop || !mobileMenuClose) {
    console.error('Mobile menu elements not found');
    return;
  }
  
  // Reset menu state
  mobileMenu.classList.remove('open');
  mobileMenuBackdrop.classList.remove('open');
  navToggle.classList.remove('is-open');
  navToggle.setAttribute('aria-expanded', 'false');
  menuOpen = false;
  
  // Remove existing listeners to prevent duplicates
  navToggle.removeEventListener('click', toggleMobileMenu);
  mobileMenuBackdrop.removeEventListener('click', closeMobileMenu);
  mobileMenuClose.removeEventListener('click', closeMobileMenu);

  // Add click listener
  navToggle.addEventListener('click', toggleMobileMenu);
  mobileMenuBackdrop.addEventListener('click', closeMobileMenu);
  mobileMenuClose.addEventListener('click', closeMobileMenu);
  
}

function closeMobileMenu() {
  if (!navToggle || !mobileMenu || !mobileMenuBackdrop) return;
  menuOpen = false;
  mobileMenu.classList.remove('open');
  mobileMenuBackdrop.classList.remove('open');
  navToggle.classList.remove('is-open');
  navToggle.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}

function toggleMobileMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  
  menuOpen = !menuOpen;
  
  // Toggle menu open state
  mobileMenu.classList.toggle('open', menuOpen);
  mobileMenuBackdrop.classList.toggle('open', menuOpen);
  navToggle.setAttribute('aria-expanded', menuOpen);
  navToggle.classList.toggle('is-open', menuOpen);
  
  document.body.style.overflow = menuOpen ? 'hidden' : '';
}

// Initialize on DOM load
document.addEventListener('DOMContentLoaded', initMobileMenu);

// Also initialize immediately in case DOM is already loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initMobileMenu);
} else {
  initMobileMenu();
}

// Close menu when clicking outside
document.addEventListener('click', (e) => {
  if (!menuOpen || !mobileMenu || !navToggle || !mobileMenuBackdrop) return;
  if (!mobileMenu.contains(e.target) && !navToggle.contains(e.target)) {
    closeMobileMenu();
  }
});

// Close menu on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && menuOpen) {
    closeMobileMenu();
  }
});

// Close mobile menu on nav link click
function initMobileMenuLinks() {
  if (!mobileMenu) return;
  
  mobileMenu.querySelectorAll('.mobile-nav-link').forEach(link => {
    link.addEventListener('click', () => {
      closeMobileMenu();
    });
  });
}

// Initialize links when menu is ready
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(initMobileMenuLinks, 100);
});

// ── Desktop dropdown functionality
const solutionsDropdown = document.getElementById('solutionsDropdown');
const dropdownMenu = solutionsDropdown?.nextElementSibling;

if (solutionsDropdown && dropdownMenu) {
  solutionsDropdown.addEventListener('click', (e) => {
    e.preventDefault();
    const isExpanded = solutionsDropdown.getAttribute('aria-expanded') === 'true';
    solutionsDropdown.setAttribute('aria-expanded', !isExpanded);
    dropdownMenu.setAttribute('aria-hidden', isExpanded);
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!solutionsDropdown.contains(e.target) && !dropdownMenu.contains(e.target)) {
      solutionsDropdown.setAttribute('aria-expanded', 'false');
      dropdownMenu.setAttribute('aria-hidden', 'true');
    }
  });

  // Close dropdown on escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      solutionsDropdown.setAttribute('aria-expanded', 'false');
      dropdownMenu.setAttribute('aria-hidden', 'true');
    }
  });
}

// ── Mobile dropdown functionality
const mobileSolutionsDropdown = document.getElementById('mobileSolutionsDropdown');
const mobileDropdownMenu = mobileSolutionsDropdown?.nextElementSibling;

if (mobileSolutionsDropdown && mobileDropdownMenu) {
  mobileSolutionsDropdown.addEventListener('click', (e) => {
    e.preventDefault();
    const isExpanded = mobileSolutionsDropdown.getAttribute('aria-expanded') === 'true';
    mobileSolutionsDropdown.setAttribute('aria-expanded', !isExpanded);
    mobileDropdownMenu.classList.toggle('show', !isExpanded);
  });
}

// ── Cal.com booking modal (inline embed)
let calInitialized = false;
let bookingModal;
let closeBtn;

function initBookingModal() {
  bookingModal = document.getElementById('booking-modal');
  closeBtn = document.getElementById('booking-close');
  if (!bookingModal || !closeBtn) return;

  if (document.body.dataset.bookingDelegationBound !== 'true') {
    document.body.dataset.bookingDelegationBound = 'true';
    document.addEventListener('click', function (e) {
      const trigger = e.target.closest('.js-book-demo');
      if (!trigger) return;
      openBookingModal(e);
    }, true);
  }

  closeBtn.addEventListener('click', closeBookingModal);

  bookingModal.addEventListener('click', function (e) {
    if (e.target === bookingModal) {
      closeBookingModal();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      closeBookingModal();
    }
  });
}

function openBookingModal(e) {
  if (e) {
    e.preventDefault();
    e.stopPropagation();
  }
  if (!bookingModal) {
    bookingModal = document.getElementById('booking-modal');
  }
  if (!bookingModal) return;
  bookingModal.style.display = 'flex';
  bookingModal.classList.add('open');
  bookingModal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';

  if (!calInitialized) {
    (function (C, A, L) {
      let p = function (a, ar) { a.q.push(ar); };
      let d = C.document;
      C.Cal = C.Cal || function () {
        let cal = C.Cal;
        let ar = arguments;
        if (!cal.loaded) {
          cal.ns = {};
          cal.q = cal.q || [];
          d.head.appendChild(d.createElement('script')).src = A;
          cal.loaded = true;
        }
        if (ar[0] === L) {
          const api = function () { p(api, arguments); };
          const namespace = ar[1];
          api.q = api.q || [];
          if (typeof namespace === 'string') {
            cal.ns[namespace] = cal.ns[namespace] || api;
            p(cal.ns[namespace], ar);
            p(cal, ['initNamespace', namespace]);
          } else p(cal, ar);
          return;
        }
        p(cal, ar);
      };
    })(window, 'https://app.cal.com/embed/embed.js', 'init');

    Cal('init', '30-min-meeting', { origin: 'https://app.cal.com' });
    Cal.ns['30-min-meeting']('inline', {
      elementOrSelector: '#my-cal-inline-30-min-meeting',
      config: { layout: 'month_view' },
      calLink: 'shreyash.iosys/30-min-meeting'
    });
    Cal.ns['30-min-meeting']('ui', { hideEventTypeDetails: false, layout: 'month_view' });

    calInitialized = true;
  }
}

function closeBookingModal() {
  if (!bookingModal) {
    bookingModal = document.getElementById('booking-modal');
  }
  if (!bookingModal) return;
  bookingModal.classList.remove('open');
  bookingModal.setAttribute('aria-hidden', 'true');
  bookingModal.style.display = 'none';
  document.body.style.overflow = '';
}

initBookingModal();
</script>
